name: CI / Release

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Check formatting
        run: uv run ruff format --check .

      - name: Lint
        run: uv run ruff check .

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Run tests with coverage
        run: uv run pytest --cov=app --cov-report=xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.xml

  sonar:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
        with:
          # Historique complet requis par SonarCloud (blame / nouveau code).
          fetch-depth: 0

      - name: Download coverage report
        uses: actions/download-artifact@v4
        with:
          name: coverage

      - name: SonarCloud analysis
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  release:
    runs-on: ubuntu-latest
    # Uniquement sur push main (jamais sur PR), après lint et tests verts.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [lint, test]
    # Deux merges rapprochés ne doivent pas se disputer le calcul du tag.
    concurrency:
      group: release
    permissions:
      contents: write   # création du tag et de la release
      packages: write   # push GHCR
      id-token: write   # signature cosign keyless (OIDC)
    env:
      IMAGE: ghcr.io/t-dat-902-homepedia/api
    steps:
      - uses: actions/checkout@v4
        with:
          # Historique complet : le bump SemVer parcourt les commits depuis le dernier tag.
          fetch-depth: 0

      - name: Compute next SemVer from conventional commits
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          tag_prefix: v
          # Pas de release si aucun commit feat/fix/BREAKING depuis le dernier tag.
          default_bump: false

      - name: Set up Docker Buildx
        if: steps.tag.outputs.new_tag != ''
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: steps.tag.outputs.new_tag != ''
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        if: steps.tag.outputs.new_tag != ''
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ steps.tag.outputs.new_version }}
            ${{ env.IMAGE }}:latest

      - name: Trivy vulnerability scan
        if: steps.tag.outputs.new_tag != ''
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.IMAGE }}:${{ steps.tag.outputs.new_version }}
          severity: CRITICAL,HIGH
          # Rapport seul pour l'instant ; passer à 1 pour bloquer la release.
          exit-code: '0'

      - name: Generate SBOM (CycloneDX)
        if: steps.tag.outputs.new_tag != ''
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.IMAGE }}:${{ steps.tag.outputs.new_version }}
          scan-type: image
          format: cyclonedx
          output: sbom.cdx.json

      - name: Install cosign
        if: steps.tag.outputs.new_tag != ''
        uses: sigstore/cosign-installer@v3

      - name: Sign image and attest SBOM (keyless)
        if: steps.tag.outputs.new_tag != ''
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          cosign sign --yes "${IMAGE}@${DIGEST}"
          cosign attest --yes --predicate sbom.cdx.json --type cyclonedx "${IMAGE}@${DIGEST}"

      - name: Create GitHub release
        if: steps.tag.outputs.new_tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.new_tag }}
          generate_release_notes: true
          files: sbom.cdx.json
